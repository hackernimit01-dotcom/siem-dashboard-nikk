<!DOCTYPE html>
<html lang="en" data-theme="{{ request.cookies.get('theme', 'light') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SIEM Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-brand">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 7v6c0 5 3.7 9.7 9 11 5.3-1.3 9-6 9-11V7l-9-5z" fill="currentColor"/>
                        <path d="M12 8c-1.7 0-3 1.3-3 3v3h6v-3c0-1.7-1.3-3-3-3z" fill="white" opacity="0.9"/>
                    </svg>
                    SIEM Dashboard
                </div>
                <div class="auth-title">Create account</div>
                <div class="auth-subtitle">Register to monitor blocked IPs, access logs, vulnerabilities, and audit activity.</div>
            </div>

            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" minlength="6" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Register</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a class="auth-link" href="{{ url_for('login') }}">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
